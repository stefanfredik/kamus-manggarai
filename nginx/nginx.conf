user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;  # Cukup untuk VPS kecil, hemat RAM
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Cloudflare Real IP ──────────────────────────────────────────────
    # Trust Cloudflare proxy IPs agar $remote_addr = IP asli user
    # Ref: https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Logging (kurangi verbosity untuk hemat I/O di VPS kecil)
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;       # Turunkan dari 65 → lebih hemat koneksi idle
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer tuning untuk VPS RAM kecil
    client_body_buffer_size    16k;
    client_header_buffer_size  1k;
    large_client_header_buffers 2 4k;
    output_buffers             1 32k;
    postpone_output            1460;

    # Gzip — hanya untuk konten teks, tidak untuk gambar (sudah binary-compressed)
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;          # Level 6 lebih CPU-intensive, 5 cukup
    gzip_min_length 512;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:5m  rate=10r/m;
    limit_req_status 429;

    client_max_body_size 10M;

    # ─── Backend upstream (satu-satunya upstream yang tersisa) ────────────────
    upstream backend_upstream {
        server backend:8080;
        keepalive 16;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────
    server {
        listen 80;
        server_name kamus.florescyber.tech;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name kamus.florescyber.tech;

        # SSL Certificates (Cloudflare Origin CA)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Security Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:5m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Catatan: OCSP Stapling tidak dipakai karena Cloudflare Origin CA
        # tidak mendukungnya. SSL terminasi publik dihandle oleh Cloudflare edge.

        # ─── Security Headers ─────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Root untuk static files frontend (langsung dari disk, tanpa proxy)
        root /usr/share/nginx/html;
        index index.html;

        # ─── API Proxy ke Backend ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Buffer untuk API responses
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 8k;
        }

        # ─── Auth Rate Limit Lebih Ketat ──────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ─── Health Check ─────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend_upstream/health;
            access_log off;
        }

        # ─── Static Assets (JS/CSS/font) dari disk — cache 1 tahun ───────
        # File Vite build punya hash di nama → aman di-cache sangat lama
        location ~* \.(js|css|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;  # Jangan log asset requests → kurangi I/O
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # ─── Frontend SPA — serve dari disk, fallback ke index.html ──────
        location / {
            try_files $uri $uri/ /index.html;

            # Cache index.html sebentar saja (agar user dapat update app terbaru)
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
