# Production stack for kamus.florescyber.tech
#
# CARA DEPLOY:
#   cp backend/.env.production.example backend/.env
#   nano backend/.env          # isi semua nilai wajib
#   docker compose pull
#   docker compose up -d --build
#
# CATATAN: Port DB dan Redis TIDAK diekspos ke publik (hanya internal Docker network)

services:
  postgres:
    image: postgres:16-alpine
    container_name: kamus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-kamus_manggarai}
      POSTGRES_USER: ${DB_USER:-kamus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD wajib diisi di .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port TIDAK diekspos ke host — hanya diakses internal Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kamus_user} -d ${DB_NAME:-kamus_manggarai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  redis:
    image: redis:7-alpine
    container_name: kamus_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD wajib diisi di .env} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # Port TIDAK diekspos ke host — hanya diakses internal Docker network
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  # Migration runner: jalankan migrate up, lalu keluar
  migrate:
    image: migrate/migrate:v4
    container_name: kamus_migrate
    volumes:
      - ./backend/db/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER:-kamus_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kamus_manggarai}?sslmode=disable
      up
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - kamus_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamus_backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      LOG_LEVEL: warn
    volumes:
      - ./data:/data:ro
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - kamus_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: kamus_frontend
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kamus_net

  nginx:
    image: nginx:1.25-alpine
    container_name: kamus_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - kamus_net

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:

networks:
  kamus_net:
    driver: bridge
