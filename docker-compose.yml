# Production stack for kamus.florescyber.tech
# Dioptimasi untuk VPS kecil (1-2 vCPU, 1-2 GB RAM)
#
# ARSITEKTUR:
#   postgres  ← database
#   redis     ← cache & rate limiting
#   migrate   ← jalankan DB migration, lalu exit
#   backend   ← Go API server
#   nginx     ← reverse proxy + serve frontend static files (SATU container)
#
# CATATAN: Tidak ada container frontend terpisah!
#   Frontend di-build di dalam nginx/Dockerfile (multi-stage build)
#   Static files disajikan langsung dari disk oleh Nginx
#
# CARA DEPLOY:
#   cp backend/.env.production.example backend/.env
#   nano backend/.env          # isi semua nilai wajib
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: kamus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-kamus_manggarai}
      POSTGRES_USER: ${DB_USER:-kamus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD wajib diisi di .env}
      # ─── PostgreSQL tuning untuk VPS kecil (1-2 GB RAM total) ───────────
      # shared_buffers: 25% dari RAM yang dialokasikan ke postgres
      # effective_cache_size: estimasi RAM OS + postgres buffer
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=192MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=30
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: '
        -c log_timezone=Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kamus_user} -d ${DB_NAME:-kamus_manggarai}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - kamus_net
    # ─── Resource limits ────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 256M       # PostgreSQL tidak boleh melebihi ini
          cpus: "0.5"
        reservations:
          memory: 64M

  redis:
    image: redis:7-alpine
    container_name: kamus_redis
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD wajib diisi di .env}
        --save ""
        --appendonly no
        --loglevel warning
        --maxmemory 32mb
        --maxmemory-policy allkeys-lru
        --hz 10
        --tcp-keepalive 300
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net
    deploy:
      resources:
        limits:
          memory: 48M        # Redis cukup kecil dengan maxmemory 32MB
          cpus: "0.2"
        reservations:
          memory: 16M

  # Migration runner: jalankan migrate up, lalu keluar (tidak makan RAM terus)
  migrate:
    image: migrate/migrate:v4
    container_name: kamus_migrate
    volumes:
      - ./backend/db/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER:-kamus_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-kamus_manggarai}?sslmode=disable
      up
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - kamus_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamus_backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      LOG_LEVEL: warn
      GOGC: "100"          # Default GC target, OK untuk production
      GOMEMLIMIT: "80MiB"  # Soft memory limit untuk Go runtime
    volumes:
      - ./data:/data:ro
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - kamus_net
    deploy:
      resources:
        limits:
          memory: 128M       # Go binary sangat lean, 128MB lebih dari cukup
          cpus: "1.0"
        reservations:
          memory: 32M

  # ─── Nginx: reverse proxy + static files frontend (SATU container) ──────────
  # Frontend di-build di dalam nginx/Dockerfile (multi-stage), tidak ada
  # container frontend terpisah. Ini menghemat ~10MB RAM dan satu proxy hop.
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: kamus_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kamus_net
    deploy:
      resources:
        limits:
          memory: 32M        # Nginx sangat hemat RAM untuk static serving
          cpus: "0.3"
        reservations:
          memory: 8M

volumes:
  postgres_data:
  redis_data:

networks:
  kamus_net:
    driver: bridge
