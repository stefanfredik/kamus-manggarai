services:
  postgres:
    image: postgres:16-alpine
    container_name: kamus_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-kamus_manggarai}
      POSTGRES_USER: ${DB_USER:-kamus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kamus_pass_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kamus_user} -d ${DB_NAME:-kamus_manggarai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  redis:
    image: redis:7-alpine
    container_name: kamus_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: kamus_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_master_key_dev_change_me}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped
    networks:
      - kamus_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamus_backend
    env_file:
      - ./backend/.env
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - kamus_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: kamus_frontend
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kamus_net

  nginx:
    image: nginx:1.25-alpine
    container_name: kamus_nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - kamus_net

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  kamus_net:
    driver: bridge
