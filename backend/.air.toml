root = "."
tmp_dir = "tmp"

[build]
  # Build the API binary into tmp/ on each change.
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  full_bin = "./tmp/api"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "vendor", "docs", "db/queries"]
  include_dir = []
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  delay = 800
  stop_on_error = true
  send_interrupt = true
  kill_delay = 2000
  log = "build-errors.log"

[log]
  time = true
  main_only = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
