# Development stack with hot reload.
#   Backend  : Air rebuilds the Go binary on change.
#   Frontend : Vite dev server with HMR.
# Usage: docker compose -f docker-compose.dev.yml up
services:
  postgres:
    image: postgres:16-alpine
    container_name: kamus_postgres_dev
    environment:
      POSTGRES_DB: ${DB_NAME:-kamus_manggarai}
      POSTGRES_USER: ${DB_USER:-kamus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kamus_pass_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kamus_user} -d ${DB_NAME:-kamus_manggarai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  redis:
    image: redis:7-alpine
    container_name: kamus_redis_dev
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_dev}
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kamus_net

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: kamus_meilisearch_dev
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_master_key_dev_change_me}
      MEILI_ENV: development
    volumes:
      - meilisearch_data_dev:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped
    networks:
      - kamus_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: kamus_backend_dev
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
    ports:
      # Host 8081 -> container 8080 (host 8080 is used by another project).
      - "8081:8080"
    volumes:
      # Bind-mount source for hot reload.
      - ./backend:/app
      # Keep the build cache / tmp dir inside the container.
      - backend_tmp_dev:/app/tmp
      # Cache Go modules across restarts.
      - go_mod_cache_dev:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - kamus_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: kamus_frontend_dev
    environment:
      # Vite proxies /api to the backend service inside the network.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      # Host 5174 -> container 5173 (host 5173 is used by another dev server).
      - "5174:5173"
    volumes:
      # Bind-mount source for HMR.
      - ./frontend:/app
      # Anonymous volume keeps container node_modules from being shadowed by the host.
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kamus_net

  nginx:
    image: nginx:1.25-alpine
    container_name: kamus_nginx_dev
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - kamus_net

volumes:
  postgres_data_dev:
  redis_data_dev:
  meilisearch_data_dev:
  backend_tmp_dev:
  go_mod_cache_dev:

networks:
  kamus_net:
    driver: bridge
